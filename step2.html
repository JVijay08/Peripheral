<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Peripheral - Blind Spot</title>
        <link rel="stylesheet" href="common.css">
        <link rel="stylesheet" href="step2.css">
        <script src="step2.js" defer></script>
    </head>
    <body>
        <main class="blind-spot-screen">
            <div class="background"></div>
            <div class="overlay"></div>
            <div class="edge-zone edge-top"></div>
            <div class="edge-zone edge-right"></div>
            <div class="edge-zone edge-bottom"></div>
            <div class="edge-zone edge-left"></div>
            <div class="edge-warning-overlay"></div>
            <p class="edge-warning-message">Don't stay at the edge</p>
            <section class="main">
                <p class="label">THE BLIND SPOT</p>
                <h1 class="heading">Keep your eyes here</h1>
                <p class="instruction">Don't go looking at the edges</p>
                <div class="focus-area">
                <div class="focus-circle">
                    <span class="focus-dot"></span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar"></div>
                </div>
                <section class="hidden-content">
                    <p class="hidden-message">You found what's hidden by keeping your eyes in the center!</p>
                    <a class="continue-button button button-outline" href="step3.html">CONTINUE</a>
                </section>
            </div>
            </section>
        </main>
    </body>
</html>
