<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Peripheral - Hidden Archive</title>
        <link rel="stylesheet" href="common.css">
        <link rel="stylesheet" href="step3.css">
        <script src="step3.js" defer></script>
    </head>
    <body>
        <main class="screen">
            <div class="background"></div>
            <div class="overlay"></div>
            <section class="archive-main">
                <p class="label">THE HIDDEN ARCHIVE</p>
                <h1 class="heading">Some things were never meant to be seen</h1>
                <p class="instruction">Open each of the records, together they form a hidden pattern</p>
                <div class="file-grid">
                    <input class="file-open" type="checkbox" id="file-one">
                    <label class="archive-file file-one-card" for="file-one">
                        <p class="file-number">FILE 01</p>
                        <div class="file-cover">
                            <p class="redacted-text">REDACTED</p>
                        </div>
                        <div class="file-reveal">
                            <p> The first layer appeared once you stopped moving your mouse. Hidden in the back, we were watching how often you moved before making it past the layer.</p>
                        </div>
                    </label>

                    <input class="file-open" type="checkbox" id="file-two">
                    <label class="archive-file file-two-card" for="file-two">
                        <p class="file-number">FILE 02</p>
                        <div class="file-cover">
                            <p class="redacted-text">REDACTED</p>
                        </div>
                        <div class="file-reveal">
                            <p>You were told to focus on the center. You were tested if you followed the rules using the edges. Every time you stayed too long in the edge, we knew, we watched, hidden in the background.</p>
                        </div>
                    </label>

                    <input class="file-open" type="checkbox" id="file-three">
                    <label class="archive-file file-three-card" for="file-three">
                        <p class="file-number">FILE 03</p>

                        <div class="file-cover">
                            <p class="redacted-text">REDACTED</p>
                        </div>

                        <div class="file-reveal">
                            <p>
                                You're able to look into a record whenever you want. Hidden in the back, we also saw how many times you went through the records.
                            </p>
                        </div>
                    </label>

                    <section class="completion-message">
                        <p>These records took note of how you acted as you uncovered each hidden layer.</p>

                        <a class="continue-button button button-outline" href="step4.html">VIEW ANALYSIS</a>
                    </section>
                </div>
            </section>
        </main>
        </body>
        </html>
